<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 256" width="400" height="256">
  <!-- Fond sombre -->
  <rect width="400" height="256" fill="#0A0A0A"/>

  <!-- Cadre gris -->
  <rect x="10" y="10" width="380" height="236" rx="4" fill="none" stroke="#141414" stroke-width="2"/>

  <!-- Header -->
  <rect x="10" y="10" width="380" height="30" fill="#141414" rx="4"/>
  <circle cx="25" cy="25" r="3" fill="#C9A961"/>
  <circle cx="35" cy="25" r="3" fill="#C9A961"/>
  <circle cx="45" cy="25" r="3" fill="#C9A961"/>

  <!-- Contenu : lignes simulant des données -->
  <line x1="20" y1="60" x2="190" y2="60" stroke="#C9A961" stroke-width="2" opacity="0.6"/>
  <line x1="20" y1="75" x2="380" y2="75" stroke="#A0A0A0" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="90" x2="380" y2="90" stroke="#A0A0A0" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="105" x2="380" y2="105" stroke="#A0A0A0" stroke-width="1" opacity="0.3"/>

  <!-- Graphique simulé (barres) -->
  <rect x="40" y="140" width="12" height="60" fill="#C9A961" opacity="0.7"/>
  <rect x="70" y="130" width="12" height="70" fill="#C9A961" opacity="0.8"/>
  <rect x="100" y="120" width="12" height="80" fill="#C9A961" opacity="0.9"/>
  <rect x="130" y="140" width="12" height="60" fill="#C9A961" opacity="0.7"/>
  <rect x="160" y="115" width="12" height="85" fill="#C9A961" opacity="0.85"/>

  <!-- Légende -->
  <circle cx="220" cy="150" r="2" fill="#C9A961"/>
  <text x="230" y="155" font-family="Georgia, serif" font-size="10" fill="#A0A0A0">Leads qualifiés</text>

  <circle cx="220" cy="175" r="2" fill="#C9A961" opacity="0.5"/>
  <text x="230" y="180" font-family="Georgia, serif" font-size="10" fill="#A0A0A0">Taux de conversion</text>
</svg>
