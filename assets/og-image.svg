<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <!-- Halo accent -->
  <radialGradient id="halo" cx="50%" cy="50%" r="50%">
    <stop offset="0%"   stop-color="#C9A961" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#C9A961" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="630" fill="url(#halo)"/>
  <!-- Logo -->
  <text x="600" y="250" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, serif" font-size="52" font-weight="700" fill="#C9A961">
    Atelier Nord
  </text>
  <!-- Tagline -->
  <text x="600" y="330" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, serif" font-size="24" fill="#A0A0A0">
    Acquisition B2B pour agences marketing françaises
  </text>
  <!-- Badge -->
  <rect x="440" y="395" width="320" height="44" rx="22" fill="none" stroke="#C9A961" stroke-opacity="0.4" stroke-width="1"/>
  <text x="600" y="417" text-anchor="middle" dominant-baseline="central"
        font-family="Georgia, serif" font-size="14" fill="#C9A961" letter-spacing="3">
    RÉSULTATS SOUS 90 JOURS
  </text>
</svg>
